name: 팀메르플로테 재고 알림

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 체크
  workflow_dispatch:         # 수동 실행 가능

jobs:
  check-stock:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nodemailer
        run: npm install nodemailer --no-save

      - name: Check stock and notify
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node .github/scripts/check-stock.js

      - name: Save notification state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notify-state.json
          git diff --staged --quiet || (git commit -m "chore: update notification state [skip ci]" && git push)
